name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Publish required legacy status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          for sha in "${GITHUB_SHA}" "${PR_HEAD_SHA:-$GITHUB_SHA}"; do
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${sha}" \
              -d "{\"state\":\"success\",\"context\":\"CI / test\",\"description\":\"GitHub Actions test job passed\",\"target_url\":\"${target_url}\"}"
          done
