<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">rag-eval-lab benchmark snapshot</title>
  <desc id="desc">Comparison of hit rate, MRR, nDCG, and faithfulness for retrieval strategies.</desc>
  <style>
    .bg { fill: #0b1020; }
    .title { fill: #f8fafc; font: 700 24px 'Inter', 'Segoe UI', sans-serif; }
    .subtitle { fill: #cbd5e1; font: 400 14px 'Inter', 'Segoe UI', sans-serif; }
    .header { fill: #e2e8f0; font: 700 13px 'Inter', 'Segoe UI', sans-serif; }
    .label { fill: #94a3b8; font: 600 12px 'Inter', 'Segoe UI', sans-serif; }
    .value { fill: #f8fafc; font: 600 12px 'Inter', 'Segoe UI', sans-serif; }
    .row { fill: #111827; }
    .rowAlt { fill: #0f172a; }
    .barHit { fill: #22c55e; }
    .barMrr { fill: #60a5fa; }
    .barNdcg { fill: #a78bfa; }
    .barFaith { fill: #f59e0b; }
  </style>

  <rect class="bg" x="0" y="0" width="980" height="420" rx="14"/>
  <text class="title" x="30" y="42">rag-eval-lab · retrieval benchmark snapshot</text>
  <text class="subtitle" x="30" y="64">Source: results/retrieval-backend-comparison.json</text>

  <text class="header" x="30" y="95">Strategy</text>
  <text class="header" x="240" y="95">Hit Rate</text>
  <text class="header" x="390" y="95">MRR</text>
  <text class="header" x="540" y="95">nDCG</text>
  <text class="header" x="690" y="95">Faithfulness</text>


  <g transform="translate(0,0)">
    <rect class="row" x="20" y="108" width="940" height="52" rx="8"/>
    <text class="label" x="30" y="138">keyword</text>
    <rect class="barHit" x="240" y="124" width="110" height="12" rx="6"/><text class="value" x="357" y="135">0.9167</text>
    <rect class="barMrr" x="390" y="124" width="110" height="12" rx="6"/><text class="value" x="507" y="135">0.9167</text>
    <rect class="barNdcg" x="540" y="124" width="110" height="12" rx="6"/><text class="value" x="657" y="135">0.9167</text>
    <rect class="barFaith" x="690" y="124" width="100" height="12" rx="6"/><text class="value" x="797" y="135">0.8360</text>
  </g>

  <g transform="translate(0,56)">
    <rect class="rowAlt" x="20" y="108" width="940" height="52" rx="8"/>
    <text class="label" x="30" y="138">semantic</text>
    <rect class="barHit" x="240" y="124" width="110" height="12" rx="6"/><text class="value" x="357" y="135">0.9167</text>
    <rect class="barMrr" x="390" y="124" width="100" height="12" rx="6"/><text class="value" x="497" y="135">0.8333</text>
    <rect class="barNdcg" x="540" y="124" width="103" height="12" rx="6"/><text class="value" x="650" y="135">0.8552</text>
    <rect class="barFaith" x="690" y="124" width="100" height="12" rx="6"/><text class="value" x="797" y="135">0.8319</text>
  </g>

  <g transform="translate(0,112)">
    <rect class="row" x="20" y="108" width="940" height="52" rx="8"/>
    <text class="label" x="30" y="138">embedding</text>
    <rect class="barHit" x="240" y="124" width="110" height="12" rx="6"/><text class="value" x="357" y="135">0.9167</text>
    <rect class="barMrr" x="390" y="124" width="105" height="12" rx="6"/><text class="value" x="502" y="135">0.8750</text>
    <rect class="barNdcg" x="540" y="124" width="106" height="12" rx="6"/><text class="value" x="653" y="135">0.8859</text>
    <rect class="barFaith" x="690" y="124" width="102" height="12" rx="6"/><text class="value" x="799" y="135">0.8531</text>
  </g>

  <g transform="translate(0,168)">
    <rect class="rowAlt" x="20" y="108" width="940" height="52" rx="8"/>
    <text class="label" x="30" y="138">embedding_strong</text>
    <rect class="barHit" x="240" y="124" width="110" height="12" rx="6"/><text class="value" x="357" y="135">0.9167</text>
    <rect class="barMrr" x="390" y="124" width="105" height="12" rx="6"/><text class="value" x="502" y="135">0.8750</text>
    <rect class="barNdcg" x="540" y="124" width="106" height="12" rx="6"/><text class="value" x="653" y="135">0.8859</text>
    <rect class="barFaith" x="690" y="124" width="102" height="12" rx="6"/><text class="value" x="799" y="135">0.8509</text>
  </g>

  <g transform="translate(0,224)">
    <rect class="row" x="20" y="108" width="940" height="52" rx="8"/>
    <text class="label" x="30" y="138">embedding_strong_rerank</text>
    <rect class="barHit" x="240" y="124" width="110" height="12" rx="6"/><text class="value" x="357" y="135">0.9167</text>
    <rect class="barMrr" x="390" y="124" width="110" height="12" rx="6"/><text class="value" x="507" y="135">0.9167</text>
    <rect class="barNdcg" x="540" y="124" width="110" height="12" rx="6"/><text class="value" x="657" y="135">0.9167</text>
    <rect class="barFaith" x="690" y="124" width="101" height="12" rx="6"/><text class="value" x="798" y="135">0.8436</text>
  </g>
</svg>
